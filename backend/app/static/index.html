<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEeT More Art</title>
    <link rel="stylesheet" href="/static/styles.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main class="container">
      <h1>MEeT More Art</h1>
      <p class="sub">Interest-based MET route planner (no npm frontend).</p>

      <section class="card">
        <h2>Your interests</h2>
        <label class="label" for="freeText">What are you curious about?</label>
        <textarea id="freeText" rows="4" placeholder="e.g. mythology, portraits, renaissance"></textarea>

        <p class="label">Or pick keywords:</p>
        <div id="chips" class="chips"></div>

        <label class="label" for="maxStops">Maximum stops: <span id="maxStopsValue">6</span></label>
        <input id="maxStops" type="range" min="3" max="30" value="6" />

        <label class="label" for="walkPreference">Walk preference</label>
        <select id="walkPreference">
          <option value="closer">Walk closer (compact route)</option>
          <option value="further">Walk further (explore more galleries)</option>
        </select>

        <button id="generateBtn" class="primary">Generate route</button>
        <p id="status" class="sub"></p>
        <p id="error" class="error"></p>
      </section>

      <section class="card">
        <h2>Directional gallery map</h2>
        <p class="sub">Interactive synthetic map mapping exactly to room coordinates.</p>
        <div class="overlayControls">
          <label><input id="overlayToggle" type="checkbox" checked /> Show route overlay</label>
          <span class="sub" style="margin-left:auto; display:inline-block;">Scroll to zoom, drag to pan</span>
        </div>
        <div class="metMapWrap" style="overflow: hidden; touch-action: none; background: #eef8ff; border: 2px dashed #c7d2fe; border-radius: 16px;">
          <svg id="routeMapOverlay" width="100%" height="450" class="routeMap" aria-label="Route overlay map">
            <g id="mapContainer">
              <!-- Route nodes and paths drawn here -->
            </g>
          </svg>
        </div>
      </section>

      <section class="card">
        <h2>Suggested route</h2>
        <ol id="routeList" class="routeList"></ol>
      </section>
    </main>

    <script src="/static/app.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
